<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Practical Exam -1</title>
     <link rel="stylesheet" href="pract.css">
</head>
<body>
     
     <div class="container">
          <h2>Employee Management System</h2>
     <div class="form.box">
          <input type="text" id="name" placeholder="Employee Name">
          <input type="text" id="id" placeholder="Employee ID">
          <input type="number" id="salary" placeholder="Salary">
          <input type="text" id="department" placeholder="Department">
     <div>

     <div class="buttons">

     <button onclick="addEmployee()">Add Employee</button>
     <button onclick="displayEmployees()">Display All</button>
     <button onclick="filterSalary()">Salary > 50000</button>
     <button onclick="totalSalary()">Total Salary</button>
     <button onclick="averageSalary()">Average Salary</button>
     <button onclick="countByDepartment()">Count by Department</button>
     <button onclick="highestSalary()">Highest Salary</button>
     
     </div>

<div id="output" class="output-box"></div>
     

</div>
</body>
<script src="pract.js"></script>
</html>
